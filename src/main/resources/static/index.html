<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayWallet — Sign In</title>
  <meta name="description" content="Sign in to your PayWallet digital wallet account" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in-up">
      <div class="auth-logo">
        <div class="logo-icon-lg">💳</div>
        <h1>PayWallet</h1>
        <p>Sign in to your wallet</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
      </form>

      <p class="auth-divider">Don't have an account? <a href="/register.html">Create one</a></p>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="/js/auth.js"></script>
</body>
</html>
