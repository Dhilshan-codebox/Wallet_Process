<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayWallet — Transaction History</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <button id="hamburger" class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <div id="sidebar-backdrop" class="overlay-backdrop"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">💳</div>
                <div>
                    <div class="logo-text">PayWallet</div>
                    <div class="logo-sub">Digital Wallet</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
                <a href="/transfer.html" class="nav-item"><span class="nav-icon">💸</span> Send Money</a>
                <a href="/history.html" class="nav-item active"><span class="nav-icon">📋</span> History</a>
                <a href="/profile.html" class="nav-item"><span class="nav-icon">👤</span> Profile</a>
                <a href="/admin.html" id="nav-admin" class="nav-item hidden"><span class="nav-icon">⚙️</span> Admin</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-pill">
                    <div class="user-avatar" id="sidebar-avatar">U</div>
                    <div class="user-info">
                        <div class="user-name" id="sidebar-user-name">Loading…</div>
                        <div class="user-role" id="sidebar-user-role">USER</div>
                    </div>
                    <button onclick="import('/js/api.js').then(m=>m.logout())"
                        style="background:none;border:none;cursor:pointer;font-size:1.1rem;padding:0.25rem"
                        title="Sign Out">🚪</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Transaction History 📋</h1>
                <p>Filter, sort, and review all your transactions.</p>
            </div>

            <!-- Filters -->
            <div class="card mb-2">
                <div class="filter-bar">
                    <div class="form-group" style="flex:2;min-width:180px">
                        <label>Search</label>
                        <input type="text" id="search-input" placeholder="Search by email or description…" />
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="filter-status">
                            <option value="">All</option>
                            <option value="COMPLETED">Completed</option>
                            <option value="PENDING">Pending</option>
                            <option value="CANCELLED">Cancelled</option>
                            <option value="FAILED">Failed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>From Date</label>
                        <input type="date" id="filter-start" />
                    </div>
                    <div class="form-group">
                        <label>To Date</label>
                        <input type="date" id="filter-end" />
                    </div>
                    <div class="form-group">
                        <label>Sort by Amount</label>
                        <select id="sort-amount">
                            <option value="">Default</option>
                            <option value="desc">Highest First</option>
                            <option value="asc">Lowest First</option>
                        </select>
                    </div>
                    <div style="display:flex;align-items:flex-end">
                        <button id="reset-filters" class="btn btn-secondary btn-sm">Reset</button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="card">
                <div class="flex items-center justify-between mb-2">
                    <h3>Transactions</h3>
                    <span class="text-muted text-sm" id="txn-count">Loading…</span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Details</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="history-tbody">
                            <tr>
                                <td colspan="5" class="text-center"><span class="spinner"></span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>
    <script type="module" src="/js/history.js"></script>
</body>

</html>
