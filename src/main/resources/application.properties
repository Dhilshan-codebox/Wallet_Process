# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/wallet_db
spring.datasource.username=root
spring.datasource.password=Dhilshan@110905

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8081

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# === SECURITY SETTINGS ===
# 2FA / OTP
app.otp.expiry-minutes=10

# Transaction Limits (USD)
app.transaction.daily-limit=10000
app.transaction.single-limit=5000
app.transaction.alert-threshold-percent=80

# Fraud Detection
app.fraud.velocity-limit=5
app.fraud.velocity-window-minutes=10
app.fraud.large-transaction-threshold=5000
app.fraud.anomaly-zscore-threshold=3.0

# Device Fingerprinting
app.device.alert-on-new-device=true

# Currency API (exchangerate-api.com - free, no key required)
app.currency.api-url=https://api.exchangerate-api.com/v4/latest/
app.currency.cache-minutes=60